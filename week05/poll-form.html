
<!DOCTYPE html>
<html lang="en-US">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1.0">
      <title>WDD 130  |  HTML Form User Poll</title>
    </head>
    <body>
    <header>
        <h1>WDD 130  |   William Pelo  |  HTML Form - User Poll</h1>
        </header>
        <main>
         <form>
          <fieldset>
            <legend>Contact Information</legend>
            <label for="fullname">Full Name:</label>
            <input type="text" id="full name" name="full name">
            <label for="email">Email:</label>
            <input type="email" id="Useremail" name="Useremail">
          </fieldset>
          <fieldset>
            <legend>Questions</legend>
            <label for="browser">What is your favorite internet browser?</label>
            <select id="browser" name="browser">
            <option value="chrome">Chrome</option> 
            <option value="firefox">firefox</option>
            <option value="safari">Safari</option>
            <option value="edge">Edge</option> 
            <option value="brave">Brave</option>
            <option value="other">Other</option>
            </select>
            <label for="pet">Do ypu have a household pet?</label>
            <input type="chechbox" id="pet" name="pet">
            <label for="feedback">List the places you lived:</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu Mali"></textarea>
          </fieldset>
          <button type="submit">Submit Poll</button>
         </form> 
         <form>
         </form>  
        </main>
       <footer>
         <p>©2023  |  HTML Form - User Poll Activity | William Pelo</p>
        </footer>
    </body>
</html>
